[package]
name = "uhura-cli"
version.workspace = true
edition.workspace = true
publish.workspace = true
# Two binaries live here (`uhura` + the asset generator); bare `cargo run`
# means the CLI.
default-run = "uhura"

[lints]
workspace = true

[[bin]]
name = "uhura"
path = "src/main.rs"

# The committed asset generator (plan micro-decision #19): seeded
# subject-motif JPEGs, regenerated from fixtures/assets/manifest.toml.
[[bin]]
name = "gen-assets"
path = "src/bin/gen_assets.rs"

[dependencies]
uhura-base = { workspace = true }
uhura-syntax = { workspace = true }
uhura-check = { workspace = true }
uhura-port = { workspace = true, features = ["toml"] }
uhura-core = { workspace = true }
uhura-fixture = { workspace = true }
uhura-editor-model = { workspace = true }
serde_json = { workspace = true }
tiny_http = { workspace = true }
toml = { workspace = true }
image = { workspace = true }
