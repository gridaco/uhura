# The base semantic element catalog (design §10 — normative). Ten
# elements, three classes; layout and aesthetics belong to CSS. The catalog
# is DATA: source cannot invent an element, prop, or event by naming it,
# and the checker validates this file against a meta-schema (input events
# only on interactive elements; observation events only on viewports).
#
# Every element additionally takes `class` (opaque, CSS-owned) — it is
# universal and deliberately not declared per element.

[catalog]
name = "base"
version = "0.3.0"

[elements.view]
class = "layout"
children = "any"

[elements.view.props.role]
type = "enum"
values = ["none", "list", "navigation", "tablist"]

[elements.scroll]
class = "layout"
viewport = true
children = "any"

[elements.scroll.props.direction]
type = "enum"
values = ["vertical", "horizontal"]

[elements.scroll.events.near-end]
kind = "observe"
# Physical proximity: remaining extent below 100% of one viewport extent —
# integer percentage, stated once here (§8.2).
threshold-percent = 100

[elements.pager]
class = "layout"
viewport = true
# Children come from exactly one keyed each (§10); uncontrolled in the spike.
children = "keyed-each"

[elements.pager.props.indicator]
type = "enum"
values = ["none", "dots"]

[elements.pager.props.label]
type = "text"
required = true

# Declared for controlled use; the spike never binds it (§10).
[elements.pager.events.page-change]
kind = "observe"

[elements.text]
class = "content"
# Literal text and {expr} interpolation — only here (§4.4).
children = "text"

[elements.img]
class = "content"
children = "none"
# a11y completeness: exactly one of alt / decorative (§10).
exactly-one-of = [["alt", "decorative"]]

[elements.img.props.src]
type = "asset"
required = true

[elements.img.props.alt]
type = "text"

[elements.img.props.decorative]
type = "bool"

# First-class time-based media. The semantic props are deliberately small:
# source/poster are provider-resolved assets, label is the accessible name,
# and playback policy remains explicit instead of renderer magic.
[elements.video]
class = "content"
children = "none"

[elements.video.props.src]
type = "asset"
required = true

[elements.video.props.poster]
type = "asset"

[elements.video.props.label]
type = "text"
required = true

[elements.video.props.autoplay]
type = "bool"

[elements.video.props.muted]
type = "bool"

[elements.video.props.loop]
type = "bool"

[elements.video.props.controls]
type = "bool"

[elements.video.props.playsinline]
type = "bool"

[elements.icon]
class = "content"
children = "none"

[elements.icon.props.name]
type = "icon"
required = true

[elements.icon.props.family]
type = "icon-family"

[elements.button]
class = "interactive"
children = "content"

[elements.button.props.label]
type = "text"
required = true

[elements.button.props.disabled]
type = "bool"

[elements.button.props.busy]
type = "bool"

[elements.button.props.pressed]
type = "bool"

[elements.button.props.current]
type = "bool"

[elements.button.events.press]
kind = "input"

[elements.textfield]
class = "interactive"
children = "none"
# Binding `value` obligates handling `change` (controlled promotion, §10).
controlled = { prop = "value", event = "change" }

[elements.textfield.props.value]
type = "text"

[elements.textfield.props.placeholder]
type = "text"

[elements.textfield.props.label]
type = "text"
required = true

[elements.textfield.props.disabled]
type = "bool"

[elements.textfield.events.change]
kind = "input"
carries = { value = "text" }

[elements.textfield.events.submit]
kind = "input"

[elements.region]
class = "interactive"
children = "one"

[elements.region.props.label]
type = "text"
required = true

[elements.region.props.supplementary]
type = "bool"

[elements.region.events.activate]
kind = "input"

[elements.region.events.activate-double]
kind = "input"
