# The §11.4 walkthrough as one play-mode script (not goldened; the M4 gate
# smoke-runs it): settle the feed, like Lena's post, add Mira's comment,
# paginate, visit Lena's profile, come back. The pagination reply carries
# the liked page-1 — authority truth persists across appends.

[[deliver]]
after-ticks = 1
port = "feed"
projection = "feed-page"
slice = "feed.page-1"

[[deliver]]
after-ticks = 1
port = "create"
projection = "draft"
slice = "create.empty"

[[deliver]]
after-ticks = 5
port = "comments"
projection = "for-post"
key = "post-lena-glaze"
slice = "comments.lena-glaze"

[[deliver]]
after-ticks = 13
port = "profile"
projection = "profile"
key = "user-lena"
slice = "profiles.lena"

[[reply]]
on = { command = "like-post", where = { post = "post-lena-glaze" } }
after-ticks = 1
outcome = "ok"

[[reply.updates]]
port = "feed"
projection = "feed-page"
slice = "feed.page-1-liked"

[[reply]]
on = { command = "add-comment", where = { post = "post-lena-glaze" } }
after-ticks = 1
outcome = "ok"

[[reply.updates]]
port = "comments"
projection = "for-post"
key = { from = "payload.post" }
slice = "comments.lena-glaze-plus-mira"

# The feed carries comment-count — every carrier settles together (§9.4).
[[reply.updates]]
port = "feed"
projection = "feed-page"
slice = "feed.page-1-liked-commented"

[[reply]]
on = { command = "load-next-page", where = { cursor = "cursor-page-2" } }
after-ticks = 2
outcome = "ok"

[[reply.updates]]
port = "feed"
projection = "feed-page"
slice = "feed.pages-1-2-liked-commented"

# Hand-play create flow. File selection/upload remains a platform/provider
# concern in live play; this deterministic driver settles the same contract.
[[reply]]
on = { command = "choose-image" }
after-ticks = 1
outcome = "ok"

[[reply.updates]]
port = "create"
projection = "draft"
slice = "create.uploaded"

[[reply]]
on = { command = "publish-image", where = { image = "object-mira-draft" } }
after-ticks = 1
outcome = "ok"

[[reply.updates]]
port = "create"
projection = "draft"
slice = "create.empty"

[[reply.updates]]
port = "feed"
projection = "feed-page"
slice = "feed.page-1-created"

[[ui]]
at-tick = 2
emit = "like-toggled"
where = { post = "post-lena-glaze", now-liked = true }

[[ui]]
at-tick = 4
emit = "comments-requested"
where = { post = "post-lena-glaze" }

[[ui]]
at-tick = 6
emit = "composer-changed"
data = { value = "Saving this palette for my kitchen reno — stunning work!" }

[[ui]]
at-tick = 7
emit = "submit-requested"

[[ui]]
at-tick = 9
emit = "dismiss-requested"

[[ui]]
at-tick = 10
emit = "feed-near-end"

[[ui]]
at-tick = 12
emit = "author-tapped"
where = { user = "user-lena" }

[[ui]]
at-tick = 14
emit = "back-tapped"

# ── hand-play additions (M5 live gate) ──────────────────────────────────
# The [[ui]] walkthrough above never triggers these; a human at the play
# shell does. One-shot, file-order — the closed world stays closed.

# Walkthrough step 3: Marco's like survives one optimistic beat, then the
# provider is unavailable — rollback + notice bar.
[[reply]]
on = { command = "like-post", where = { post = "post-marco-baja" } }
after-ticks = 2
outcome = "unavailable"
reason = "network unavailable"

# Walkthrough step 11: the bottom tab visits the viewer's own profile.
[[deliver]]
after-ticks = 1
port = "profile"
projection = "profile"
key = "user-mira"
slice = "profiles.mira"
