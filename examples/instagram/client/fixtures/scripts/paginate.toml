# §11.4 step 8: scroll to the bottom — exactly one load-next-page; the
# wiggle re-observation is guard-dropped (the guard IS the dedupe); the two
# remaining followed-author posts append with keys preserved. CI-goldened.

[[deliver]]
after-ticks = 1
port = "feed"
projection = "feed-page"
slice = "feed.page-1"

[[reply]]
on = { command = "load-next-page", where = { cursor = "cursor-page-2" } }
after-ticks = 2
outcome = "ok"

[[reply.updates]]
port = "feed"
projection = "feed-page"
slice = "feed.pages-1-2"

[[ui]]
at-tick = 2
emit = "feed-near-end"

[[ui]]
at-tick = 3
emit = "feed-near-end"
