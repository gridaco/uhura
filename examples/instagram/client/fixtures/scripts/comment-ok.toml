# §11.4 steps 5–7: open comments, type Mira's comment, Post — a dimmed
# optimistic row swaps atomically for the authoritative comment (the reply
# echoes the typed body and mints the id, §9.5); closing the sheet
# restores focus to the comment button. CI-goldened.

[[deliver]]
after-ticks = 1
port = "feed"
projection = "feed-page"
slice = "feed.page-1"

[[deliver]]
after-ticks = 3
port = "comments"
projection = "for-post"
key = "post-lena-glaze"
slice = "comments.lena-glaze"

[[reply]]
on = { command = "add-comment", where = { post = "post-lena-glaze" } }
after-ticks = 1
outcome = "ok"

[[reply.updates]]
port = "comments"
projection = "for-post"
key = { from = "payload.post" }
slice = "comments.lena-glaze-plus-mira"

[[ui]]
at-tick = 2
emit = "comments-requested"
where = { post = "post-lena-glaze" }

[[ui]]
at-tick = 4
emit = "composer-changed"
data = { value = "Saving this palette for my kitchen reno — stunning work!" }

[[ui]]
at-tick = 5
emit = "submit-requested"

[[ui]]
at-tick = 7
emit = "dismiss-requested"
