# The per-post comment thread (design §9.1: keyed projection `for-post` +
# `add-comment`). Ports are separate namespaces: `image-ref`/`user-ref` here
# are this contract's own declarations; cross-port compatibility is
# structural (micro-decision — canonical shapes compare equal).

[port]
name = "comments"
version = "0.1.0"

[types.image-ref]
kind = "record"

[types.image-ref.fields]
src = "asset"
alt = "text"

[types.user-ref]
kind = "record"

[types.user-ref.fields]
id = "id"
username = "text"
display-name = "text"
avatar = "image-ref"

[types.comment]
kind = "record"

[types.comment.fields]
id = "id"
author = "user-ref"
body = "text"
posted-label = "text"

[types.comment-thread]
kind = "record"

[types.comment-thread.fields]
comments = "list<comment>"

# Keyed by post id: `for-post(post)` (§9.2).
[projections.for-post]
type = "comment-thread"
key = "id"

[refusals.not-authorized]
[refusals.comment-body-invalid]
[refusals.not-found]

[commands.add-comment]
payload = { post = "id", body = "text" }
refusals = ["not-authorized", "comment-body-invalid", "not-found"]
