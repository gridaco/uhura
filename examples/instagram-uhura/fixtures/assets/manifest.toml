# Asset manifest — id → file, required alt text, and the motif spec the
# committed generator renders (plan micro-decision #19: assets are locally
# generated, seeded, no network or licensing). Regenerate with:
#   cargo run -p uhura-cli --bin gen-assets -- examples/instagram
# Motifs: duotone (avatars), glaze (tile grids), wave, aurora, crumb
# (speckle), field (soft gradient blocks). Same seed → same bytes.
# Play-only `media-*.mp4` files intentionally sit beside this manifest rather
# than becoming generator entries: `gen-assets` emits JPEGs, while read-only
# Editor previews project each video's listed poster and never embed its source.

