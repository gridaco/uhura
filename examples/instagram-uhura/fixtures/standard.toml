has-more = true

# Both pages, like AND comment settled, feed EXHAUSTED — the demo's
# pagination reply (authored truth never regresses mid-walkthrough; the
# end cap renders from `!has-more`, and a further near-end fires into an
# unsatisfied guard — the observation descriptor itself is markup-authored
# and stays in V; the acceptance battery pins the guard rejection).
[feed.pages-1-2-liked-commented]
stories = "@feed.stories"
posts = [
  "@posts.lena-glaze-liked-commented",
  "@posts.marco-baja",
  "@posts.nils-aurora",
  "@posts.priya-starter",
  "@posts.ayla-ferry",
