# The thread after add-comment settles: the four authored comments plus
# Mira's — the comment-ok script's piggybacked update (§9.4). The last
# entry carries the driver's only two substitutions (§9.5).
[comments.lena-glaze-plus-mira]
comments = [
  "@comments.lena-1",
  "@comments.lena-2",
  "@comments.lena-3",
  "@comments.lena-4",
  "@comments.mira-reply",
]

[comments.empty]
comments = []

# Mira's demo comment (§11.2) as the driver's substitution template:
# `@fresh-id` mints the authority's comment id; `@payload.body` echoes the
# typed text — the optimistic row swaps for this atomically (§9.4/§9.5).
[comments.mira-reply]
id = "@fresh-id"
author = "@users.mira"
body = "@payload.body"
posted-label = "now"

