# The standard fixture — the §11.2 cast as named, typed data slices.
# Slices are raw values typed at every binding site (L8 at use — an
# ill-typed slice is a link error where it binds). `"@<ns>.<name>"` strings
# splice another slice (resolved at load, cycles rejected), so a post is
# authored exactly once. No lorem ipsum; time/count labels are
# provider-formatted strings (core has no clock, §9.1).

# ── boot (auto-bound by the examples resolver, §6.1) ────────────────────

[boot]
viewer = "@users.mira"

